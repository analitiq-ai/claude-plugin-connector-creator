name: Tests

# Runs the validator test suite (tests/connector_validator/). Without this,
# the Layer 1 + Layer 2 tests and the schema-drift guards only ran when a
# contributor remembered to run pytest locally (issue #20).

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Daily — exercises the network-marked drift guards that pin plugin-side
    # enums to the live published contract, so contract drift is caught even
    # when no one opens a PR.
    - cron: '17 6 * * *'
  workflow_dispatch:

jobs:
  unit:
    name: Validator tests (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest 'jsonschema>=4.18'
      - name: Run offline tests
        # The whole suite minus the live-fetch guards — fast and hermetic, so
        # it gates every PR.
        run: pytest tests/connector_validator/ -m "not network" -v

  drift:
    name: Schema-drift guards (network)
    # Live-fetch tests against schemas.analitiq.ai. Scheduled / on-demand only,
    # never on PRs, so a flaky or unreachable schema host can't block merges.
    # NOTE: these `pytest.skip` when the host is unreachable, so a green run
    # here means "no drift OR host was down" — see #20 for tightening this into
    # a hard failure/alert if the guards silently no-op.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest 'jsonschema>=4.18'
      - name: Run network drift guards
        run: pytest tests/connector_validator/ -m network -v -rs
